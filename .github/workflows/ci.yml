name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        env:
          LLM_MODE: mock
        run: pytest

  docker:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для пуша образов в GHCR
    strategy:
      matrix:
        include:
          - { image: askops-orchestrator, dockerfile: agents/orchestrator/Dockerfile }
          - { image: askops-rag, dockerfile: agents/rag/Dockerfile }
          - { image: askops-analyst, dockerfile: agents/analyst/Dockerfile }
          - { image: askops-action, dockerfile: agents/action/Dockerfile }
          - { image: askops-notifier, dockerfile: agents/notifier/Dockerfile }
          - { image: askops-ui, dockerfile: ui/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR требует owner в нижнем регистре.
      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Пушим только при пуше в main; на PR (в т.ч. из форков) — только сборка.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
