{{- /*
По одному Service на каждый включённый сервис — стабильное DNS-имя внутри
кластера (напр. http://rag:8001), по которому агенты находят друг друга.
*/ -}}
{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "askops.labels" $root | nindent 4 }}
spec:
  type: {{ $root.Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
      protocol: TCP
{{- end }}
{{- end }}
